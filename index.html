<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXAA STREAM | أفلام عربي فقط</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #060606; color: #fff; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(to top, #060606 10%, transparent 90%); }
        .movie-card { transition: all 0.4s ease; cursor: pointer; border-radius: 15px; overflow: hidden; background: #111; }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(225, 29, 72, 0.4); }
        .category-btn.active { background: #e11d48; border-color: #e11d48; box-shadow: 0 0 15px rgba(225, 29, 72, 0.4); }
        #video-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        iframe { width: 90%; max-width: 1100px; height: 70vh; border-radius: 15px; border: 2px solid #e11d48; background: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="video-overlay">
        <div class="w-[90%] max-w-[1100px] flex justify-between items-center mb-4 bg-zinc-900 p-4 rounded-xl">
            <h2 id="playing-title" class="text-xl font-bold text-white italic">جاري تشغيل الفيلم...</h2>
            <button onclick="closePlayer()" class="bg-rose-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-rose-700 transition">إغلاق ×</button>
        </div>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="bg-rose-600 p-2 rounded-lg italic font-black text-white">FIXAA</div>
            <h1 class="text-xl font-bold tracking-widest uppercase">STREAM <span class="text-rose-600 text-xs">ARABIC</span></h1>
        </div>
        <div class="relative">
            <input type="text" id="search" placeholder="ابحث عن فيلم عربي..." class="bg-zinc-900 border border-white/10 rounded-full px-10 py-2 text-xs focus:w-72 transition-all outline-none focus:border-rose-600 text-right">
        </div>
    </nav>

    <div id="hero" class="relative h-[80vh] w-full flex items-end p-8 md:p-20 overflow-hidden">
        <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover -z-10">
        <div class="absolute inset-0 hero-gradient -z-10"></div>
        <div class="max-w-3xl space-y-4">
            <span class="bg-rose-600 px-3 py-1 rounded text-[10px] font-bold">أحدث الإصدارات العربية</span>
            <h2 id="hero-title" class="text-5xl md:text-7xl font-black italic text-rose-600"></h2>
            <p id="hero-desc" class="text-gray-300 text-sm md:text-lg line-clamp-3 leading-relaxed"></p>
            <button id="hero-play" class="bg-white text-black px-10 py-4 rounded-xl font-black hover:bg-rose-600 hover:text-white transition-all shadow-xl italic">▶ مشاهدة الفيلم</button>
        </div>
    </div>

    <div class="px-6 py-4 overflow-x-auto no-scrollbar flex gap-4 sticky top-[72px] bg-[#060606] z-40 border-b border-white/5">
        <button onclick="loadArabicByGenre('', this)" class="category-btn active border border-white/10 px-8 py-2 rounded-xl text-xs font-bold transition-all">الكل</button>
        <button onclick="loadArabicByGenre('28', this)" class="category-btn border border-white/10 px-8 py-2 rounded-xl text-xs font-bold transition-all">أكشن</button>
        <button onclick="loadArabicByGenre('35', this)" class="category-btn border border-white/10 px-8 py-2 rounded-xl text-xs font-bold transition-all">كوميدي</button>
        <button onclick="loadArabicByGenre('18', this)" class="category-btn border border-white/10 px-8 py-2 rounded-xl text-xs font-bold transition-all">دراما</button>
        <button onclick="loadArabicByGenre('27', this)" class="category-btn border border-white/10 px-8 py-2 rounded-xl text-xs font-bold transition-all">رعب</button>
    </div>

    <main class="px-6 py-12">
        <h3 id="section-title" class="text-2xl font-black mb-8 pr-4 border-r-8 border-rose-600 italic uppercase tracking-tighter">السينما العربية</h3>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <script>
        const API_KEY = '551fccd1a3a8def119305ff94bb4e1d1';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        
        // سيرفر المشاهدة (الأفضل للمحتوى العربي)
        const MOVIE_SERVER = 'https://vidsrc.cc/v2/embed/movie/';

        async function init() {
            // سحب أول صفحة أفلام عربي تريند للهيرو
            const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar-SA&with_original_language=ar&sort_by=popularity.desc`);
            const data = await res.json();
            
            if(data.results.length > 0) {
                const top = data.results[0];
                document.getElementById('hero-img').src = 'https://image.tmdb.org/t/p/original' + top.backdrop_path;
                document.getElementById('hero-title').innerText = top.title;
                document.getElementById('hero-desc').innerText = top.overview || "لا يوجد وصف متاح حالياً.";
                document.getElementById('hero-play').onclick = () => openPlayer(top.id, top.title);
                renderGrid(data.results);
            }
        }

        // دالة جلب الأفلام حسب النوع (أكشن، كوميدي، الخ) - عربي فقط
        async function loadArabicByGenre(genreId, btn) {
            setActiveBtn(btn);
            let url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar-SA&with_original_language=ar&sort_by=popularity.desc`;
            if(genreId) url += `&with_genres=${genreId}`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderGrid(data.results);
            document.getElementById('section-title').innerText = btn.innerText;
        }

        function renderGrid(movies) {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="openPlayer('${m.id}', '${m.title}')">
                    <div class="relative aspect-[2/3]">
                        <img src="${m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                            <div class="bg-rose-600 p-3 rounded-full shadow-lg scale-125">▶</div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="text-[11px] font-bold truncate text-center">${m.title}</h4>
                        <p class="text-[9px] text-zinc-500 text-center mt-1">${m.release_date ? m.release_date.split('-')[0] : ''}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openPlayer = (id, title) => {
            document.getElementById('playing-title').innerText = "مشاهدة: " + title;
            document.getElementById('video-iframe').src = MOVIE_SERVER + id;
            document.getElementById('video-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closePlayer = () => {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('video-iframe').src = "";
            document.body.style.overflow = 'auto';
        };

        function setActiveBtn(btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // بحث عربي ذكي
        document.getElementById('search').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const term = e.target.value;
                if(term) {
                    const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${term}&language=ar-SA`);
                    const data = await res.json();
                    // فلترة النتائج لتكون عربي فقط يدوياً للتأكيد
                    const arabicResults = data.results.filter(m => m.original_language === 'ar');
                    renderGrid(arabicResults);
                    document.getElementById('hero').style.display = 'none';
                    document.getElementById('section-title').innerText = "نتائج البحث عن: " + term;
                }
            }
        });

        init();
    </script>
</body>
</html>
