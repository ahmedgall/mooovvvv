<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXAA STREAM | السينما العربية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #060606; color: #fff; scroll-behavior: smooth; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(to top, #060606 10%, transparent 90%); }
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border-radius: 15px; overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.05); }
        .movie-card:hover { transform: scale(1.05); border-color: #e11d48; box-shadow: 0 10px 30px rgba(225, 29, 72, 0.3); }
        .category-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .category-btn.active { background: #e11d48; border-color: #e11d48; box-shadow: 0 0 15px rgba(225, 29, 72, 0.4); }
        #video-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        iframe { width: 95%; max-width: 1100px; height: 75vh; border-radius: 20px; border: 2px solid #e11d48; box-shadow: 0 0 50px rgba(225, 29, 72, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="video-overlay">
        <div class="w-[95%] max-w-[1100px] flex justify-between items-center mb-4 bg-zinc-900/80 p-4 rounded-2xl backdrop-blur-md">
            <h2 id="playing-title" class="text-lg font-bold text-white truncate max-w-[70%] italic">جاري التشغيل...</h2>
            <button onclick="closePlayer()" class="bg-rose-600 text-white px-8 py-2 rounded-xl font-bold hover:bg-rose-700 transition transform hover:scale-105">إغلاق ×</button>
        </div>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <span class="bg-rose-600 px-3 py-1 rounded-lg font-black text-white italic">FIXAA</span>
            <h1 class="text-xl font-bold tracking-tighter hidden md:block">STREAM <span class="text-rose-600">ARABIC</span></h1>
        </div>
        <div class="relative group">
            <input type="text" id="search" placeholder="ابحث عن فيلم عربي..." class="bg-zinc-900/50 border border-white/10 rounded-full px-12 py-2 text-xs focus:w-80 transition-all outline-none focus:border-rose-600 text-right backdrop-blur-sm">
            <svg class="absolute right-4 top-2.5 opacity-40" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
    </nav>

    <div id="hero" class="relative h-[85vh] w-full flex items-end p-8 md:p-20 overflow-hidden">
        <img id="hero-img" src="" class="absolute inset-0 w-full h-full object-cover -z-10 transition-opacity duration-1000">
        <div class="absolute inset-0 hero-gradient -z-10"></div>
        <div class="max-w-3xl space-y-6">
            <div class="flex items-center gap-2">
                <span class="bg-rose-600/20 text-rose-500 border border-rose-600/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">أفضل الأفلام العربية</span>
                <span id="hero-rating" class="text-yellow-500 font-bold text-sm"></span>
            </div>
            <h2 id="hero-title" class="text-5xl md:text-7xl font-black italic leading-none"></h2>
            <p id="hero-desc" class="text-gray-300 text-sm md:text-lg line-clamp-3 max-w-xl leading-relaxed"></p>
            <button id="hero-play" class="bg-white text-black px-12 py-4 rounded-2xl font-black hover:bg-rose-600 hover:text-white transition-all shadow-2xl flex items-center gap-3 transform hover:-translate-y-1 italic">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 22v-20l18 10-18 10z"/></svg>
                شاهد الآن
            </button>
        </div>
    </div>

    <div class="px-6 py-6 overflow-x-auto no-scrollbar flex gap-4 sticky top-[72px] bg-[#060606]/80 backdrop-blur-md z-40 border-b border-white/5">
        <button onclick="loadByGenre('', this)" class="category-btn active px-8 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap">الكل</button>
        <button onclick="loadByGenre('28', this)" class="category-btn px-8 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap">أكشن</button>
        <button onclick="loadByGenre('35', this)" class="category-btn px-8 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap">كوميدي</button>
        <button onclick="loadByGenre('18', this)" class="category-btn px-8 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap">دراما</button>
        <button onclick="loadByGenre('27', this)" class="category-btn px-8 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap">رعب</button>
    </div>

    <main class="px-6 py-12">
        <div class="flex items-center justify-between mb-10">
            <h3 id="section-title" class="text-2xl font-black pr-4 border-r-4 border-rose-600 italic">السينما العربية</h3>
        </div>
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
            </div>
    </main>

    <script>
        const API_KEY = '551fccd1a3a8def119305ff94bb4e1d1';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        
        // سيرفر المشاهدة الأكثر استقراراً للأفلام العربية
        const PLAYER_URL = 'https://vidsrc.xyz/embed/movie/';

        async function init() {
            try {
                const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar-SA&with_original_language=ar&sort_by=popularity.desc`);
                const data = await res.json();
                
                if(data.results.length > 0) {
                    const top = data.results[0];
                    document.getElementById('hero-img').src = 'https://image.tmdb.org/t/p/original' + top.backdrop_path;
                    document.getElementById('hero-title').innerText = top.title;
                    document.getElementById('hero-desc').innerText = top.overview || "لا يوجد وصف متوفر لهذا الفيلم حالياً.";
                    document.getElementById('hero-rating').innerText = "⭐ " + top.vote_average.toFixed(1);
                    document.getElementById('hero-play').onclick = () => openPlayer(top.id, top.title);
                    renderGrid(data.results);
                }
            } catch (error) {
                console.error("خطأ في تحميل البيانات:", error);
            }
        }

        async function loadByGenre(genreId, btn) {
            setActiveBtn(btn);
            let url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar-SA&with_original_language=ar&sort_by=popularity.desc`;
            if(genreId) url += `&with_genres=${genreId}`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderGrid(data.results);
            document.getElementById('section-title').innerText = btn.innerText;
        }

        function renderGrid(movies) {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card group" onclick="openPlayer('${m.id}', '${m.title}')">
                    <div class="relative aspect-[2/3]">
                        <img src="${m.poster_path ? IMG_URL + m.poster_path : 'https://via.placeholder.com/500x750?text=لا+يوجد+بوستر'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="bg-rose-600 p-4 rounded-full shadow-2xl transform scale-75 group-hover:scale-100 transition-transform">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 22v-20l18 10-18 10z"/></svg>
                            </div>
                        </div>
                        <div class="absolute top-2 left-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-[10px] font-bold text-yellow-500">
                            ⭐ ${m.vote_average.toFixed(1)}
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="text-xs font-bold truncate text-right mb-1">${m.title}</h4>
                        <p class="text-[10px] text-zinc-500 text-right">${m.release_date ? m.release_date.split('-')[0] : 'قريباً'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openPlayer = (id, title) => {
            document.getElementById('playing-title').innerText = "مشاهدة الآن: " + title;
            document.getElementById('video-iframe').src = PLAYER_URL + id;
            document.getElementById('video-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closePlayer = () => {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('video-iframe').src = "";
            document.body.style.overflow = 'auto';
        };

        function setActiveBtn(btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.getElementById('search').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const term = e.target.value;
                if(term) {
                    const res = await fetch(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${term}&language=ar-SA`);
                    const data = await res.json();
                    const arabicOnly = data.results.filter(m => m.original_language === 'ar');
                    renderGrid(arabicOnly);
                    document.getElementById('hero').style.display = 'none';
                    document.getElementById('section-title').innerText = "نتائج البحث عن: " + term;
                }
            }
        });

        init();
    </script>
</body>
</html>
